run_config:
  resume_from_checkpoint: false
  force_regenerate_data: false

curriculum:
  # Stage 0: Gaussian Pre-training (The Base Model)
  stage0:
    name: "Gaussian Pre-training"
    data_dir: "data/stage0_gaussian"
    epochs: 50
    batch_size: 32
    learning_rate: 0.0001
    num_workers: 4
    resume_from_last_stage: false

  # Stage 1: Ideal PSF Fine-tuning (Future)
  stage1:
    name: "Ideal PSF Fine-tuning"
    data_dir: "data/stage1_romanisim"
    epochs: 50
    batch_size: 32
    learning_rate: 0.00001
    num_workers: 4
    resume_from_last_stage: true

data_params:
  num_train_samples: 5000
  num_val_samples: 1000
  min_stars: 500
  max_stars: 1500
  image_size: 256
  max_capacity_per_cell: 3
  shape_size: 9
