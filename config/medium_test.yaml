run_config:
  resume_from_checkpoint: true
  force_regenerate_data: false

curriculum:
  stage0:
    name: "Medium Test Stage"
    data_dir: "data/medium_test"
    epochs: 20
    batch_size: 4
    learning_rate: 0.0005
    resume_from_last_stage: false

data_params:
  num_train_samples: 1000
  num_val_samples: 200
  min_stars: 500
  max_stars: 1500
  image_size: 256
  max_capacity_per_cell: 3
  shape_size: 9

